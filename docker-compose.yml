services:
  app:
    build: .
    env_file:
      - .env
    container_name: manajemen-klinik
    ports:
      - "1357:80"
    depends_on:
      - mysql
  mysql:
    image: mysql:8.4
    container_name: mysql-klinik
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: klinik
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
